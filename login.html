<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nutri - Iniciar Sesión</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>
    <div class="contenedor-login">
        <div class="tarjeta-login">
            <h1>Nutri<span>Vida</span></h1>
            <p>Tu plataforma de productos saludables</p>
            
            <form>
                <div class="grupo-input">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" placeholder="ejemplo@nutri.com" required>
                </div>
                
                <div class="grupo-input">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="boton-entrar">Entrar ahora</button>
            </form>
            
            <div class="enlaces">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <a href="#">Crear cuenta saludable</a>
            </div>
        </div>
    </div>
</body>
</html>
