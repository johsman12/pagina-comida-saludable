<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>comida Saludable</title>
    <link rel="stylesheet" href="/estilo.css">
</head>
<body>
<header class="encabezado">
  <div class="navbar">
    <h1>Nutrik</h1>
    <p>MEJORA TU SALUD YA</p>
  </div>
  
  <input class="buscador" type="text" placeholder="Buscar producto">

  <div class="iconos1">
    <img class="user" src="/Imagenes/avatar.png" alt="usuario">
    <p class="puser">Iniciar Sesión</p>

  </div>
  <div class="iconos2">
        <img class="carrito" src="/Imagenes/carrito-de-compras.png" alt="carrito">
  </div>
  

</header>

<nav>
  <button>Inicio</button>
  <button>Comprar</button>
  <button>Iniciar Sesión</button>
</nav>

<div class="contenedor">

  <div class="productos">

    <div class="producto">
      <img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=300" alt="Ensalada">

      <p>$10.000</p>
      <button>Comprar</button>
    </div>

    <div class="producto">
      <img src="https://images.unsplash.com/photo-1498837167922-ddd27525d352?w=300" alt="Frutas">
      <h3>Mix de Frutas</h3>
      <p>$9.000</p>
      <button>Comprar</button>
    </div>

    <div class="producto">
      <img src="https://images.unsplash.com/photo-1553530666-ba11a7da3888?w=300" alt="Jugo">
      <h3>Jugo Detox</h3>
      <p>$8.000</p>
      <button>Comprar</button>
    </div>

    <div class="producto">
      <img src="https://images.unsplash.com/photo-1605478371310-a9f1e96b4ff4?w=300" alt="Bowl">
      <h3>Bowl Saludable</h3>
      <p>$12.000</p>
      <button>Comprar</button>
    </div>

  </div>
</div>

<footer>
  <br><br>
   <h2>NUTRICK</h2>
    <p>Taller web SENA</p>
    <p>© 2026 Comida Saludable</p>

</footer>
